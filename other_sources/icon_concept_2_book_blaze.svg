<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: deep burnt-orange → warm gold -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#BF360C"/>
      <stop offset="50%"  stop-color="#E64A19"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>

    <!-- Lightning bolt: white top → yellow → amber bottom -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>

    <!-- Glow for the bolt -->
    <filter id="glow" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feOffset dx="6" dy="10" in="blur" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.35" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="cs"/>
      <feMerge>
        <feMergeNode in="cs"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for page lines: left page -->
    <clipPath id="leftPage">
      <rect x="100" y="195" width="400" height="565" rx="14"/>
    </clipPath>
    <!-- Clip for page lines: right page -->
    <clipPath id="rightPage">
      <rect x="524" y="195" width="400" height="565" rx="14"/>
    </clipPath>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft glowing circles in background for depth -->
  <circle cx="900" cy="130" r="200" fill="white" opacity="0.06"/>
  <circle cx="80"  cy="920" r="180" fill="white" opacity="0.05"/>
  <circle cx="512" cy="512" r="460" fill="none" stroke="white" stroke-width="2" opacity="0.06"/>

  <!-- ── Open Book ──────────────────────────────────────────────────── -->
  <g filter="url(#sh)">
    <!-- Left page -->
    <rect x="100" y="195" width="400" height="565" rx="14" fill="#FAFAFA"/>
    <!-- Text lines clipped to left page -->
    <g clip-path="url(#leftPage)" stroke="#CFD8DC" stroke-width="9" stroke-linecap="round">
      <line x1="140" y1="280" x2="460" y2="280"/>
      <line x1="140" y1="330" x2="460" y2="330"/>
      <line x1="140" y1="380" x2="360" y2="380"/>
      <line x1="140" y1="445" x2="460" y2="445"/>
      <line x1="140" y1="495" x2="460" y2="495"/>
      <line x1="140" y1="545" x2="310" y2="545"/>
      <line x1="140" y1="610" x2="460" y2="610"/>
      <line x1="140" y1="660" x2="460" y2="660"/>
      <line x1="140" y1="710" x2="380" y2="710"/>
    </g>

    <!-- Right page -->
    <rect x="524" y="195" width="400" height="565" rx="14" fill="#FAFAFA"/>
    <!-- Text lines clipped to right page -->
    <g clip-path="url(#rightPage)" stroke="#CFD8DC" stroke-width="9" stroke-linecap="round">
      <line x1="564" y1="280" x2="884" y2="280"/>
      <line x1="564" y1="330" x2="884" y2="330"/>
      <line x1="564" y1="380" x2="750" y2="380"/>
      <line x1="564" y1="445" x2="884" y2="445"/>
      <line x1="564" y1="495" x2="884" y2="495"/>
      <line x1="564" y1="545" x2="720" y2="545"/>
      <line x1="564" y1="610" x2="884" y2="610"/>
      <line x1="564" y1="660" x2="884" y2="660"/>
      <line x1="564" y1="710" x2="800" y2="710"/>
    </g>

    <!-- Book spine -->
    <rect x="496" y="180" width="32" height="600" rx="6" fill="#4E342E"/>

    <!-- Book bottom edge / cover shadow -->
    <rect x="82" y="748" width="860" height="32" rx="8" fill="#3E2723" opacity="0.75"/>
  </g>

  <!-- ── Lightning bolt (over the book) ────────────────────────────── -->
  <!-- Path: top-right → zig → bottom-left -->
  <g filter="url(#glow)">
    <path d="M 700 110  L 495 500  L 615 500  L 355 930  L 545 490  L 420 490  Z"
          fill="url(#boltGrad)" opacity="0.96"/>
    <!-- crisp white edge -->
    <path d="M 700 110  L 495 500  L 615 500  L 355 930  L 545 490  L 420 490  Z"
          fill="none" stroke="white" stroke-width="5" opacity="0.55"/>
  </g>
</svg>

