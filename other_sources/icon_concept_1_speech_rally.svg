<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: deep indigo → vivid violet -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A237E"/>
      <stop offset="55%"  stop-color="#4527A0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>

    <!-- Checkered tile used for the racing strip -->
    <pattern id="checker" x="0" y="0" width="128" height="128" patternUnits="userSpaceOnUse">
      <rect x="0"  y="0"  width="64" height="64" fill="white" opacity="0.18"/>
      <rect x="64" y="64" width="64" height="64" fill="white" opacity="0.18"/>
    </pattern>

    <!-- Soft drop shadow -->
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feOffset dx="6" dy="10" in="blur" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.32" result="flood"/>
      <feComposite in="flood" in2="offsetBlur" operator="in" result="coloredShadow"/>
      <feMerge>
        <feMergeNode in="coloredShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────── -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle sparkle dots -->
  <circle cx="90"  cy="110" r="6"  fill="#C5CAE9" opacity="0.4"/>
  <circle cx="880" cy="75"  r="9"  fill="#C5CAE9" opacity="0.3"/>
  <circle cx="970" cy="310" r="5"  fill="#C5CAE9" opacity="0.3"/>
  <circle cx="55"  cy="760" r="6"  fill="#C5CAE9" opacity="0.25"/>
  <circle cx="130" cy="840" r="4"  fill="#C5CAE9" opacity="0.2"/>
  <circle cx="950" cy="840" r="11" fill="#C5CAE9" opacity="0.15"/>

  <!-- ── Checkered racing strip (bottom) ───────────────────────────── -->
  <rect x="0" y="880" width="1024" height="144" fill="url(#checker)"/>
  <!-- thin divider line above strip -->
  <rect x="0" y="878" width="1024" height="4" fill="white" opacity="0.20"/>

  <!-- ── LEFT speech bubble (white) ───────────────────────────────── -->
  <!-- body: x=55 y=95 w=570 h=400 rx=80 -->
  <!-- tail bottom-left: base overlaps rect by 8px so no gap -->
  <g filter="url(#sh)">
    <rect x="55" y="95" width="570" height="400" rx="80" fill="white" opacity="0.95"/>
    <polygon points="175,487  90,615  310,487" fill="white" opacity="0.95"/>
  </g>

  <!-- ── RIGHT speech bubble (deep orange) ────────────────────────── -->
  <!-- body: x=400 y=330 w=570 h=400 rx=80 -->
  <!-- tail bottom-right -->
  <g filter="url(#sh)">
    <rect x="400" y="330" width="570" height="400" rx="80" fill="#FF6D00"/>
    <polygon points="820,722  935,840  780,722" fill="#FF6D00"/>
  </g>

  <!-- ── "L" inside left bubble (bubble center ≈ 340, 295) ─────────── -->
  <text x="340" y="295"
        font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="300" fill="#283593"
        text-anchor="middle" dominant-baseline="central">L</text>

  <!-- ── "R" inside right bubble (bubble center ≈ 685, 530) ───────── -->
  <text x="685" y="530"
        font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="300" fill="white"
        text-anchor="middle" dominant-baseline="central">R</text>
</svg>

