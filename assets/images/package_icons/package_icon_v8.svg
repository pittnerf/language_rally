<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flashcard / Q&A — rounded rect yellow background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#FEFCE8" stroke="#CA8A04" stroke-width="3"/>
  <!-- Back cards staggered -->
  <rect x="40" y="16" width="68" height="52" rx="8" fill="#FDE68A" stroke="#F59E0B" stroke-width="2"/>
  <rect x="28" y="22" width="68" height="52" rx="8" fill="#FEF08A" stroke="#F59E0B" stroke-width="2"/>
  <!-- Front card (white) -->
  <rect x="16" y="28" width="68" height="52" rx="8" fill="white" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- Question mark drawn as paths, centred on front card (cx≈50, cy≈54) -->
  <!-- Top arc -->
  <path d="M40 48 Q40 36 50 36 Q60 36 60 46 Q60 54 50 58" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Short stem -->
  <line x1="50" y1="58" x2="50" y2="64" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
  <!-- Dot -->
  <circle cx="50" cy="72" r="3.5" fill="#F59E0B"/>
  <!-- Answer card below -->
  <rect x="20" y="88" width="88" height="28" rx="8" fill="#FEF08A" stroke="#CA8A04" stroke-width="2"/>
  <line x1="34" y1="98" x2="98" y2="98" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="108" x2="84" y2="108" stroke="#CA8A04" stroke-width="2.5" stroke-linecap="round"/>
</svg>

