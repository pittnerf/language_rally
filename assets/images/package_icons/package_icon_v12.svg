<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Magnifying glass on document — circular indigo background -->
  <circle cx="64" cy="64" r="56" fill="#EEF2FF" stroke="#4F46E5" stroke-width="3"/>
  <!-- Document / page -->
  <rect x="18" y="20" width="62" height="80" rx="6" fill="white" stroke="#C7D2FE" stroke-width="2"/>
  <!-- Document text lines -->
  <line x1="28" y1="36" x2="68" y2="36" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="47" x2="68" y2="47" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="58" x2="68" y2="58" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="69" x2="68" y2="69" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="80" x2="54" y2="80" stroke="#C7D2FE" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="90" x2="62" y2="90" stroke="#C7D2FE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Magnifying glass lens -->
  <circle cx="83" cy="77" r="22" fill="rgba(238,242,255,0.90)" stroke="#4F46E5" stroke-width="4"/>
  <!-- Lens highlight text lines -->
  <line x1="74" y1="73" x2="92" y2="73" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="74" y1="81" x2="92" y2="81" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="98" y1="92" x2="114" y2="110" stroke="#4F46E5" stroke-width="6" stroke-linecap="round"/>
</svg>

