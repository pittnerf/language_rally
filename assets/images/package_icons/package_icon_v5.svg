<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Graduation Cap — rounded rect violet background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#F5F3FF" stroke="#7C3AED" stroke-width="3"/>
  <!-- Mortarboard flat top (diamond) -->
  <polygon points="64,22 110,44 64,56 18,44" fill="#7C3AED"/>
  <!-- Board top sheen -->
  <ellipse cx="64" cy="40" rx="10" ry="4" fill="white" fill-opacity="0.2"/>
  <!-- Cap body cylinder -->
  <path d="M44 52 L44 78 Q44 90 64 90 Q84 90 84 78 L84 52 L64 62 Z" fill="#6D28D9"/>
  <!-- Cap body top highlight -->
  <path d="M44 52 L64 62 L84 52 L64 58 Z" fill="#7C3AED"/>
  <!-- Tassel cord -->
  <line x1="110" y1="44" x2="110" y2="72" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="110" cy="76" r="6" fill="#F59E0B"/>
  <!-- Tassel threads -->
  <line x1="105" y1="79" x2="100" y2="96" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="80" x2="110" y2="98" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="79" x2="120" y2="96" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
</svg>

