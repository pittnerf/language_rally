<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Globe + speech bubble — circular teal background -->
  <circle cx="64" cy="64" r="56" fill="#F0FDFA" stroke="#0D9488" stroke-width="3"/>
  <!-- Globe body -->
  <circle cx="58" cy="62" r="34" fill="#E0F2FE" stroke="#0284C7" stroke-width="2.5"/>
  <!-- Longitude curves -->
  <path d="M58 28 C48 40 48 84 58 96" stroke="#0284C7" stroke-width="1.5" fill="none"/>
  <path d="M58 28 C68 40 68 84 58 96" stroke="#0284C7" stroke-width="1.5" fill="none"/>
  <!-- Equator -->
  <line x1="24" y1="62" x2="92" y2="62" stroke="#0284C7" stroke-width="1.5"/>
  <!-- Tropic lines -->
  <path d="M26 48 Q58 42 90 48" stroke="#7DD3FC" stroke-width="1.5" fill="none"/>
  <path d="M26 76 Q58 82 90 76" stroke="#7DD3FC" stroke-width="1.5" fill="none"/>
  <!-- Speech bubble (top-right) -->
  <rect x="72" y="20" width="44" height="32" rx="8" fill="#0D9488"/>
  <!-- Bubble tail pointing to globe -->
  <path d="M76 52 L70 64 L92 52 Z" fill="#0D9488"/>
  <!-- Bubble text lines -->
  <line x1="80" y1="30" x2="108" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="40" x2="108" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="98" y2="50" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
</svg>

