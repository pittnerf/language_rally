<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Two Speech Bubbles — rounded rect sky-blue background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="3"/>
  <!-- Top-left speech bubble -->
  <rect x="12" y="20" width="72" height="44" rx="10" fill="#3B82F6"/>
  <path d="M20 64 L14 78 L40 64 Z" fill="#3B82F6"/>
  <!-- Top bubble text lines -->
  <line x1="22" y1="35" x2="74" y2="35" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="47" x2="74" y2="47" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="57" x2="54" y2="57" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom-right speech bubble (reply) -->
  <rect x="44" y="64" width="72" height="44" rx="10" fill="#10B981"/>
  <!-- Tail pointing up-left (reply) -->
  <path d="M108 64 L114 50 L88 64 Z" fill="#10B981"/>
  <!-- Bottom bubble text lines -->
  <line x1="54" y1="79" x2="106" y2="79" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="91" x2="106" y2="91" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="54" y1="101" x2="86" y2="101" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
</svg>

