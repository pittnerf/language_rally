flutter_launcher_icons:
  # ── Source image ──────────────────────────────────────────────────────────
  image_path: "assets/app_icons/language_rally_race.png"

  # ── Android ───────────────────────────────────────────────────────────────
  android: true                          # overwrites res/mipmap-*/ic_launcher.png
  min_sdk_android: 21

  # Adaptive icon (Android 8.0+)
  # The original image is used as the foreground layer; the teal brand colour
  # fills the background so it looks great on any launcher shape.
  adaptive_icon_foreground: "assets/app_icons/language_rally_race.png"
  adaptive_icon_background: "#006064"   # Calm Teal – matches the app theme

  # ── iOS ───────────────────────────────────────────────────────────────────
  ios: true                              # overwrites all AppIcon sizes

  # ── Web ───────────────────────────────────────────────────────────────────
  web:
    generate: true
    image_path: "assets/app_icons/language_rally_race.png"
    background_color: "#006064"
    theme_color: "#006064"

  # ── Windows ───────────────────────────────────────────────────────────────
  windows:
    generate: true
    image_path: "assets/app_icons/language_rally_race.png"
    icon_size: 48                        # generates an .ico with multiple embedded sizes

  # ── macOS ─────────────────────────────────────────────────────────────────
  macos:
    generate: true
    image_path: "assets/app_icons/language_rally_race.png"

  # ── Linux ─────────────────────────────────────────────────────────────────
  linux:
    generate: true
    image_path: "assets/app_icons/language_rally_race.png"

